 ==================== 图片分类配置 (task_type: classification) ====================
# 任务配置
 num_classes: 3
 class_names:
   - freshapples
   - rottenapples
   - unripeapples

# 数据配置
 data_path: "../data/apple_dataset"
 dataset_type: folder

# 模型配置
 model_name: mobilenet_v2
 input_size: 224
 batch_size: 32
 learning_rate: 0.001
 weight_decay: 0.0001
 scheduler: cosine

# 数据增强
 augmentation:
   horizontal_flip: True
   vertical_flip: False
   rotation: 15
   brightness: 0.2
   contrast: 0.2